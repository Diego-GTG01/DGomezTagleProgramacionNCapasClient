<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Formulario de Registro de Usuario</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <!-- Header -->
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0 fw-bold">
                            <i class="bi bi-person-plus me-2"></i>Formulario de Registro de Usuario
                        </h4>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form method="post" th:object="${Usuario}" th:action="@{/Usuario/Form}"
                            enctype="multipart/form-data">

                            <!-- Información Personal -->
                            <h4 class="mb-3">
                                <i class="bi bi-person-vcard me-2"></i>Información Personal
                            </h4>

                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <div class="card p-3 w-100">
                                        <label for="imagenFileLabel" class="form-label fw-bold">Imagen de Perfil</label>

                                        <div class="input-group has-validation">
                                            <span class="input-group-text">
                                                <i class="bi bi-camera"></i>
                                            </span>
                                            <input type="file" class="form-control" name="imagen" id="imagen"
                                                accept="image/*"
                                                th:classappend="${#fields.hasErrors('imagenFile')} ? ' is-invalid' : ''">

                                            <div th:if="${errorImagen}" class="invalid-feedback d-block">
                                                <span th:text="${errorImagen}"></span>
                                            </div>

                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('imagenFile')}"
                                                th:errors="*{imagenFile}">
                                            </div>
                                        </div>

                                        <div class="text-center mt-3">

                                            <img th:if="${Usuario.ImagenFile != null}"
                                                th:src="'data:image/jpeg;base64,' + ${Usuario.ImagenFile}"
                                                style="max-width: 300px; max-height: 300px;"
                                                class="img-fluid img-thumbnail" alt="Foto de perfil">


                                            <img th:if="${Usuario.ImagenFile == null}" id="previewImage"
                                                style="max-width: 300px; max-height: 300px; display: none;"
                                                class="img-fluid img-thumbnail" src="#" alt="Vista previa">
                                        </div>

                                        <div class="form-text">
                                            <i class="bi bi-info-circle me-1"></i>Formatos permitidos: JPG, PNG.
                                            Tamaño máximo: 5MB.
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Nombre(s) *</label>

                                    <div class="input-group has-validation">
                                        <span class="input-group-text">
                                            <i class="bi bi-person"></i>
                                        </span>

                                        <input id="Nombre" th:field="*{Nombre}" type="text" class="form-control"
                                            th:classappend="${#fields.hasErrors('Nombre')} ? ' is-invalid' : ''"
                                            placeholder="Nombre(s)" onkeypress="SoloLetras(this, event)"
                                            onblur="SoloLetrasBlur(this)">

                                        <span id="errorNombre" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Nombre')}" th:errors="*{Nombre}">
                                        </span>
                                    </div>
                                </div>


                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Apellido Paterno *</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                        <input id="ApellidoPaterno"
                                            th:classappend="${#fields.hasErrors('ApellidoPaterno')} ? ' is-invalid' : ''"
                                            th:field="*{ApellidoPaterno}" type="text" class="form-control"
                                            placeholder="Apellido Paterno" onkeypress="SoloLetras(this, event)"
                                            onblur="SoloLetrasBlur(this)">
                                        <span id="errorApellidoPaterno" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('ApellidoPaterno')}"
                                            th:errors="*{ApellidoPaterno}">
                                        </span>

                                    </div>

                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Apellido Materno</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-person-bounding-box"></i></span>
                                        <input id="ApellidoMaterno"
                                            th:classappend="${#fields.hasErrors('ApellidoMaterno')} ? ' is-invalid' : ''"
                                            th:field="*{ApellidoMaterno}" type="text" class="form-control"
                                            placeholder="Apellido Materno" onkeypress="SoloLetras(this, event)"
                                            onblur="SoloLetrasBlur(this)">

                                        <span id="errorApellidoMaterno" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('ApellidoMaterno')}"
                                            th:errors="*{ApellidoMaterno}">
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Fecha de Nacimiento *</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                        <input th:field="*{FechaNacimiento}" type="date" class="form-control"
                                            id="fechaNacimiento"
                                            th:classappend="${#fields.hasErrors('FechaNacimiento')} ? ' is-invalid' : ''"
                                            onkeydown="return false" onkeypress="return false" onpaste="return false"
                                            onchange="ValidarFechaNacimiento(this)"
                                            onblur="ValidarFechaNacimiento(this)">
                                        <span id="errorfechaNacimiento" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('FechaNacimiento')}"
                                            th:errors="*{FechaNacimiento}">
                                        </span>
                                    </div>

                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label d-block">Sexo *</label>

                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{Sexo}" value="MM">
                                        <label class="form-check-label">Masculino</label>
                                    </div>

                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{Sexo}" value="FF">
                                        <label class="form-check-label">Femenino</label>
                                    </div>


                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('Sexo')}"
                                        th:errors="*{Sexo}">
                                    </div>
                                </div>


                                <div class="col-md-4 mb-3">
                                    <label class="form-label">CURP *</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                                        <input id="CURP"
                                            th:classappend="${#fields.hasErrors('CURP')} ? ' is-invalid' : ''"
                                            th:field="*{CURP}" maxlength="18" type="text" class="form-control"
                                            placeholder="CURP" onblur="validarCURPBlur(this)">

                                        <span id="errorCURP" class="invalid-feedback" th:errors="*{CURP}">
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <!-- Contacto -->
                            <h4 class="mt-4 mb-3">
                                <i class="bi bi-telephone me-2"></i>Información de Contacto
                            </h4>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Correo Electrónico *</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input id="Email" th:field="*{Email}" type="email" class="form-control"
                                            th:classappend="${#fields.hasErrors('Email')} ? ' is-invalid' : ''"
                                            placeholder="example@email.com" onblur="validarEmailBlur(this)">
                                        <span class="text-danger"></span>
                                        <span id="errorEmail" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Email')}" th:errors="*{Email}">
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Celular *</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                        <input id="Celular" th:field="*{Celular}" type="tel" class="form-control"
                                            th:classappend="${#fields.hasErrors('Celular')} ? ' is-invalid' : ''"
                                            placeholder="Numero de Celular" onkeypress="SoloNumeros(this, event)"
                                            onblur="SoloNumerosBlur(this)">

                                        <span id="errorCelular" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Celular')}" th:errors="*{Celular}">
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Teléfono</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input id="Telefono" th:field="*{Telefono}" type="tel" class="form-control"
                                            th:classappend="${#fields.hasErrors('Telefono')} ? ' is-invalid' : ''"
                                            placeholder="Numero Telefonico" onkeypress="SoloNumeros(this, event)"
                                            onblur="SoloNumerosBlur(this)">

                                        <span id="errorTelefono" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Telefono')}" th:errors="*{Telefono}">
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <!-- Usuario -->
                            <h4 class="mt-4 mb-3">
                                <i class="bi bi-person-circle me-2"></i>Información de Usuario
                            </h4>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre de Usuario</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-person-circle"></i></span>
                                        <input th:field="*{UserName}" type="text" class="form-control"
                                            placeholder="Ingrese su Nombre de Usuario"
                                            th:classappend="${#fields.hasErrors('UserName')} ? ' is-invalid' : ''"
                                            onkeypress="SoloLetrasNumerosEspacios(this, event)"
                                            onblur="SoloLetrasNumerosEspaciosBlur(this)">
                                        <span id="errorUserName" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('UserName')}" th:errors="*{UserName}">
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Rol *</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                        <select id="Rol" class="form-select" th:field="*{Rol.IdRol}"
                                            th:classappend="${#fields.hasErrors('Rol.IdRol')} ? ' is-invalid' : ''"
                                            onchange="ValidarSelect(this, event)" onblur="ValidarSelectBlur(this)">
                                            <option value="0" disabled selected>Seleccione un rol</option>
                                            <option th:each="rol : ${Roles}" th:value="${rol.IdRol}"
                                                th:text="${rol.Nombre}">
                                            </option>
                                        </select>

                                        <span id="errorRol" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Rol.IdRol')}" th:errors="*{Rol.IdRol}">
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Contraseña *</label>
                                    <div class="input-group has-validation">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input th:field="*{Password}" type="password" class="form-control"
                                            placeholder="Ingrese su contraseña" id="password"
                                            th:classappend="${#fields.hasErrors('Password')} ? ' is-invalid' : ''"
                                            onchange="ValidarSelect(this, event)"
                                            onblur="ValidarPassword(this, event); ValidarPasswordBlur(this); ValidarConfirmacionPassword()">
                                        <span id="errorpassword" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Password')}" th:errors="*{Password}">
                                        </span>

                                    </div>


                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Confirmar Contraseña *</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                        <input type="password" class="form-control" placeholder="Confirme su contraseña"
                                            id="confirmPassword"
                                            onblur="ValidarPassword(this, event); ValidarPasswordBlur(this); ValidarConfirmacionPassword()">
                                    </div>
                                    <span id="errorconfirmPassword" class="mt-1 small"></span>
                                </div>

                            </div>

                            <!-- Dirección -->
                            <h4 class="mt-4 mb-3 border-bottom pb-2">
                                <i class="bi bi-geo-alt me-2"></i>Dirección
                            </h4>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">País *</label>
                                    <div class="input-group has-validation">

                                        <select id="ddlpais" class="form-select"
                                            th:field="*{Direcciones[0].Colonia.Municipio.Estado.Pais.IdPais}"
                                            th:classappend="${#fields.hasErrors('Direcciones[0].Colonia.Municipio.Estado.Pais.IdPais')} ? ' is-invalid' : ''"
                                            onchange="ValidarSelect(this, event)" onblur="ValidarSelectBlur(this)">
                                            <option value="0" disabled selected>Seleccione un país</option>
                                            <option th:each="pais : ${Paises}" th:value="${pais.IdPais}"
                                                th:text="${pais.Nombre}">
                                            </option>
                                        </select>
                                        <span id="errorddlpais" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Direcciones[0].Colonia.Municipio.Estado.Pais.IdPais')}"
                                            th:errors="*{Direcciones[0].Colonia.Municipio.Estado.Pais.IdPais}">
                                        </span>

                                    </div>

                                </div>




                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Estado *</label>
                                    <div class="input-group has-validation">
                                        <select id="ddlestado" class="form-select"
                                            th:classappend="${#fields.hasErrors('Direcciones[0].Colonia.Municipio.Estado.IdEstado')} ? ' is-invalid' : ''"
                                            th:field="*{Direcciones[0].Colonia.Municipio.Estado.IdEstado}"
                                            onchange="ValidarSelect(this, event)" onblur="ValidarSelectBlur(this)">
                                            <option value="0" disabled selected>Seleccione un Estado</option>

                                        </select>

                                        <span id="errorddlestado" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Direcciones[0].Colonia.Municipio.Estado.IdEstado')}"
                                            th:errors="*{Direcciones[0].Colonia.Municipio.Estado.IdEstado}">
                                        </span>
                                    </div>

                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Municipio</label>
                                    <div class="input-group has-validation">
                                        <select id="ddlmunicipio" class="form-select"
                                            th:classappend="${#fields.hasErrors('Direcciones[0].Colonia.Municipio.IdMunicipio')} ? ' is-invalid' : ''"
                                            th:field="*{Direcciones[0].Colonia.Municipio.IdMunicipio}"
                                            onchange="ValidarSelect(this, event)" onblur="ValidarSelectBlur(this)">
                                            <option value="0" disabled selected>Seleccione un Municipio</option>

                                        </select>

                                        <span id="errorddlmunicipio" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Direcciones[0].Colonia.Municipio.IdMunicipio')}"
                                            th:errors="*{Direcciones[0].Colonia.Municipio.IdMunicipio}">
                                        </span>
                                    </div>

                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Colonia *</label>
                                    <div class="input-group has-validation">
                                        <select id="ddlcolonia" class="form-select"
                                            th:classappend="${#fields.hasErrors('Direcciones[0].Colonia.IdColonia')} ? ' is-invalid' : ''"
                                            th:field="*{Direcciones[0].Colonia.IdColonia}"
                                            onchange="ValidarSelect(this, event)" onblur="ValidarSelectBlur(this)">
                                            <option value="0" disabled selected>Seleccione una Colonia</option>

                                        </select>

                                        <span id="errorddlcolonia" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Direcciones[0].Colonia.IdColonia')}"
                                            th:errors="*{Direcciones[0].Colonia.IdColonia}">
                                        </span>
                                    </div>


                                </div>



                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Código Postal *</label>
                                    <input id="codigoPostal" type="text" class="form-control" disabled>


                                </div>




                                <div class="col-12 mb-3">
                                    <label class="form-label">Calle *</label>
                                    <div class="input-group has-validation">
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-signpost"></i></span>
                                            <input id="calle" th:field="*{Direcciones[0].Calle}"
                                                th:classappend="${#fields.hasErrors('Direcciones[0].Calle')} ? ' is-invalid' : ''"
                                                type="text" class="form-control"
                                                placeholder="Ingregse la calle de su Domicilio"
                                                onkeypress="SoloLetrasNumerosEspacios(this, event)"
                                                onblur="SoloLetrasNumerosEspaciosBlur(this)">
                                            <span id="errorcalle" class="invalid-feedback"
                                                th:if="${#fields.hasErrors('Direcciones[0].Calle')}"
                                                th:errors="*{Direcciones[0].Calle}">
                                            </span>
                                        </div>

                                    </div>

                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Número Exterior *</label>
                                    <div class="input-group has-validation">
                                        <input id="numexterior" th:field="*{Direcciones[0].NumeroExterior}" type="text"
                                            class="form-control" placeholder="Numero exterior de su Domicilio"
                                            th:classappend="${#fields.hasErrors('Direcciones[0].NumeroExterior')} ? ' is-invalid' : ''"
                                            onkeypress="SoloLetrasNumerosEspacios(this, event)"
                                            onblur="SoloLetrasNumerosEspaciosBlur(this)">
                                        <span id="errornumexterior" class="invalid-feedback"
                                            th:if="${#fields.hasErrors('Direcciones[0].NumeroExterior')}"
                                            th:errors="*{Direcciones[0].NumeroExterior}">
                                        </span>

                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Número Interior </label>
                                    <input th:field="*{Direcciones[0].NumeroInterior}" type="text" class="form-control"
                                        placeholder="Numero interior de su Domicilio">
                                </div>

                                <div class="col-12 mb-3">
                                    <button type="button" class="btn btn-primary">
                                        <i class="bi bi-plus-circle me-2"></i>Agregar Dirección
                                    </button>
                                </div>
                            </div>

                            <!-- Botones -->
                            <div class="text-end mt-4">
                                <a type="button" class="btn btn-danger btn-lg me-2" th:href="@{/Usuario}">
                                    <i class="bi bi-x-circle me-2"></i>Cancelar
                                </a>
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="bi bi-check-circle me-2"></i>Registrar Usuario
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
<script>
    $(document).ready(function () {

        var hoy = new Date();
        var dd = String(hoy.getDate()).padStart(2, '0');
        var mm = String(hoy.getMonth() + 1).padStart(2, '0');
        var yyyy = hoy.getFullYear();
        var maxDate = (yyyy - 18) + '-' + mm + '-' + dd;
        $("#fechaNacimiento").attr('max', maxDate);
        $('#imagen').on('change', function () {
            const preview = $('#previewImage');
            const file = this.files[0];
            const maxSize = 5 * 1024 * 1024; // 5MB

            if (file) {

                if (!file.type.startsWith('image/')) {
                    alert('Por favor, selecciona un archivo de imagen válido (JPG, PNG, GIF)');
                    $(this).val('');
                    preview.hide().attr('src', '#');
                    return;
                }

                if (file.size > maxSize) {
                    alert('El archivo es demasiado grande. Tamaño máximo: 5MB');
                    $(this).val('');
                    preview.hide().attr('src', '#');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.attr('src', e.target.result).show();
                };
                reader.readAsDataURL(file);
            } else {
                preview.hide().attr('src', '#');
            }
        });
        $('form').on('submit', function (e) {
            const imagenFile = $('#imagen')[0].files[0];
            if (imagenFile && imagenFile.size > 5 * 1024 * 1024) {
                e.preventDefault();
                alert('La imagen es demasiado grande. Máximo 5MB');
                return false;
            }

            return true;
        });
        $("#ddlpais").change(function () {
            var IdPais = $("#ddlpais").val();
            if (IdPais != 0) {
                $.ajax({
                    url: "/Usuario/getEstadosByPais/" + IdPais,
                    type: "GET",
                    dataType: 'json',
                    success: function (data, textStatus, jqXHR) {
                        $("#ddlestado").empty();
                        $("#ddlmunicipio").empty();
                        $("#ddlcolonia").empty();
                        $("#codigoPostal").val("");
                        $("#ddlmunicipio").append("<option value=0 disabled selected>Selecciona un Municipio</option>");
                        $("#ddlcolonia").append("<option value=0 disabled selected>Selecciona una Colonia</option>");
                        $("#ddlestado").append("<option value=0 disabled selected>Selecciona un Estado</option>");
                        $("#ddlestado").removeClass('is-valid');
                        $("#ddlmunicipio").removeClass('is-valid');
                        $("#ddlcolonia").removeClass('is-valid');
                        $("#ddlestado").removeClass('is-invalid');
                        $("#ddlmunicipio").removeClass('is-invalid');
                        $("#ddlcolonia").removeClass('is-invalid');
                        $.each(data.Objects, function (i, estado) {
                            $("#ddlestado").append("<option value=" + estado.IdEstado + ">" + estado.Nombre + "</option>");
                        });
                    },
                    error: function (jqXHR, textStatus, errorThrown) {
                        alert("No se pudo procesar la tarea");
                    }
                });
            } else {

                $("#ddlestado").empty();
                $("#ddlmunicipio").empty();
                $("#ddlcolonia").empty();
                $("#codigoPostal").val("");
                $("#ddlestado").append("<option value=0 disabled selected>Selecciona un Estado</option>");
                $("#ddlmunicipio").append("<option value=0 disabled selected>Selecciona un Municipio</option>");
                $("#ddlcolonia").append("<option value=0 disabled selected>Selecciona una Colonia</option>");
                $("#ddlestado").removeClass('is-valid');
                $("#ddlmunicipio").removeClass('is-valid');
                $("#ddlcolonia").removeClass('is-valid');
                $("#ddlestado").removeClass('is-invalid');
                $("#ddlmunicipio").removeClass('is-invalid');
                $("#ddlcolonia").removeClass('is-invalid');
            }


        });
        $("#ddlestado").change(function () {
            var IdEstado = $("#ddlestado").val();
            if (IdEstado != 0) {
                $.ajax({
                    url: "/Usuario/getMunicipiosByEstado/" + IdEstado, //petición asincrona

        var confirm = confirmInput.val();
        var errorElement = $("#errorconfirmPassword");
        if (errorElement.length === 0) {
            confirmInput.closest('.input-group').append(
                '<span id="errorconfirmPassword" class="invalid-feedback"></span>'
            );
            errorElement = $("#errorconfirmPassword");
        }

        if (confirm.length === 0) {
            errorElement.text('');
            confirmInput.removeClass('is-valid is-invalid');
            return false;
        }

        if (password !== confirm) {
            errorElement.text('Las contraseñas no coinciden');
            confirmInput.addClass('is-invalid').removeClass('is-valid');
            return false;
        }

        errorElement.text('');
        confirmInput.removeClass('is-invalid').addClass('is-valid');
        return true;
    }

    function ValidarFechaNacimiento(input) {
        var fechaNacimiento = $(input).val();
        if (fechaNacimiento === "") {
            $("#error" + input.id).text('');
            $(input).removeClass('is-valid');
            return false;
        }

        var fechaNac = new Date(fechaNacimiento);
        var hoy = new Date();
        var edad = hoy.getFullYear() - fechaNac.getFullYear();
        var mes = hoy.getMonth() - fechaNac.getMonth();
        if (mes < 0 || (mes === 0 && hoy.getDate() < fechaNac.getDate())) {
            edad--;
        }

        if (edad >= 18) {
            $("#error" + input.id).text('');
            $(input).removeClass('is-invalid');
            $(input).addClass('is-valid');
            return true;
        } else {
            $(input).addClass('is-invalid');
            $(input).removeClass('is-valid');
            $("#error" + input.id).text('Debe ser mayor de 18 años').css('color', 'red');
            return false;
        }
    }

<script>
    function cargarPais(idPais) {
        const select = document.getElementById('ddlpais');
        for (let i = 0; i < select.options.length; i++) {
            if (select.options[i].value === idPais.toString()) {
                select.selectedIndex = i;
                break;
            }
        }
    }
    function cargarEstadoByPais(IdPais, IdEstado) {
        $.ajax({
            url: "getEstadosByPais/" + IdPais,
            type: "GET",
            dataType: "json",
            success: function (data) {
                if (data.Correct && data.Objects && data.Objects.length > 0) {
                    $("#ddlestado").empty();
                    data.Objects.forEach(function (item) {
                        $("#ddlestado").append(
                            "<option value='" + item.IdEstado + "'" +
                            (item.IdEstado == IdEstado ? " selected" : "") + ">" +
                            item.Nombre +
                            "</option>"
                        );
                    });
                } else {
                    $("#ddlestado").empty();
                    alert("No se encontraron municipios para el estado seleccionado.");
                }
            },
            error: function (jqXHR, textStatus, errorThrown) {
                console.error("Error al obtener municipios:", textStatus, errorThrown);
            }
        });
    }

        $.ajax({

                    $("#ddlmunicipio").empty();

            error: function (jqXHR, textStatus, errorThrown) {

    }
