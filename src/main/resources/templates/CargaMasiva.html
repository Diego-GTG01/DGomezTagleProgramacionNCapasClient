<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Formulario Usuario</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4">

                        <!-- Título -->
                        <div class="text-center mb-4">
                            <i class="bi bi-person-circle text-primary fs-1"></i>
                            <h3 class="mt-2">Formulario Usuario</h3>
                        </div>

                        <div id="contenedorErrores" class="mt-3" style="display:none"></div>

                        <div class="d-grid mb-12">
                            <form th:action="@{/Usuario/CargaMasivaProcesar}" method="get" class="d-grid">
                                <input type="hidden" th:value="${idArchivoActual}" name="idRuta" />
                                <button id="FormProcesar" type="submit" class="text-center btn btn-primary btn-lg"
                                    style="display:none">
                                    <i class="bi bi-plus-circle me-2 text-center"></i>
                                    Procesar Archivo
                                </button>
                            </form>
                        </div>


                        <div class="d-grid mb-3">
                            <button id="mostrarFormulario" class="btn btn-primary btn-lg" onclick="mostrarFormulario()">
                                <i class="bi bi-plus-circle me-2"></i>
                                Mostrar Formulario
                            </button>
                        </div>

                        <div id="botones" class="row g-2 mb-3" style="display:none">
                            <div class="col-6">
                                <button class="btn btn-outline-success w-100" id="btnExcel">
                                    <i class="bi bi-file-excel me-2"></i>
                                    Excel
                                </button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-primary w-100" id="btnTxt">
                                    <i class="bi bi-file-text me-2"></i>
                                    TXT
                                </button>
                            </div>
                        </div>

                        <div id="formularioArchivo" class="mt-3 p-3 bg-white border rounded" style="display: none">

                            <form id="uploadForm" action="/Usuario/cargamasiva" method="post"
                                enctype="multipart/form-data">

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">
                                        Seleccionar archivo
                                    </label>
                                    <input type="file" class="form-control" id="archivo" name="archivo">

                                    <small class="text-muted" id="fileTypeHint">
                                        Formatos: Excel o TXT
                                    </small>
                                </div>

                                <button type="submit" class="btn btn-success w-100" id="cargaMasiva">
                                    <i class="bi bi-upload me-2"></i>
                                    Subir
                                </button>

                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mostrarFormulario() {
            document.getElementById("mostrarFormulario").style.display = "none";
            document.getElementById("botones").style.display = "flex";

            Swal.fire({
                icon: 'success',
                title: '¡Selecciona el tipo de archivo!',
                timer: 1500,
                showConfirmButton: false,
                position: 'top-end',
                toast: true
            });
        }

        let tipoArchivo = "";

        document.getElementById("btnExcel").addEventListener("click", function () {
            tipoArchivo = "xlsx";
            document.getElementById("formularioArchivo").style.display = "block";
            document.getElementById("archivo").setAttribute("accept", ".xlsx");

            let btn = document.getElementById("cargaMasiva");
            btn.className = "btn btn-success w-100";
            btn.innerHTML = '<i class="bi bi-file-excel me-2"></i>Subir Excel';
            document.getElementById("fileTypeHint").innerHTML = 'Formato seleccionado: Excel';
        });

        document.getElementById("btnTxt").addEventListener("click", function () {
            tipoArchivo = "txt";
            document.getElementById("formularioArchivo").style.display = "block";
            document.getElementById("archivo").setAttribute("accept", ".txt");

            let btn = document.getElementById("cargaMasiva");
            btn.className = "btn btn-primary w-100";
            btn.innerHTML = '<i class="bi bi-file-text me-2"></i>Subir TXT';
            document.getElementById("fileTypeHint").innerHTML = 'Formato seleccionado: TXT';
        });

        document.getElementById("archivo").addEventListener("change", function () {
            if (this.files.length > 0) {
                let extension = this.files[0].name.split('.').pop().toLowerCase();

                if (extension !== tipoArchivo) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'Debe ser un archivo ' + tipoArchivo.toUpperCase(),
                        confirmButtonColor: '#dc3545'
                    });
                    this.value = "";
                } else {
                    Swal.fire({
                        icon: 'success',
                        title: 'Archivo válido',
                        timer: 1000,
                        showConfirmButton: false,
                        position: 'top-end',
                        toast: true
                    });
                }
            }
        });

        document.getElementById("uploadForm").addEventListener("submit", function (e) {
            if (!document.getElementById("archivo").files[0]) {
                e.preventDefault();
                Swal.fire({
                    icon: 'warning',
                    title: 'Selecciona un archivo',
                    confirmButtonColor: '#ffc107'
                });
            }
        });
    </script>
    <script th:inline="javascript">

        var Errores = [[${ errores }]];

        if (Errores != null && Errores.length > 0) {

            Swal.fire({
                title: "Oppss!",
                text: "Parece que el archivo tiene errores",
                icon: "error",
                draggable: true
            });

            var contenedor = document.getElementById("contenedorErrores");
            contenedor.style.display = "block";

            var tabla = `
            <div class="alert alert-danger rounded-3">
                <h5 class="mb-3">Se encontraron los siguientes errores:</h5>
                <div class="table-responsive">
                    <table class="table table-bordered table-striped table-sm">
                        <thead class="table-danger">
                            <tr>
                                <th>#</th>
                                <th>Descripción del error</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

            for (var i = 0; i < Errores.length; i++) {
                tabla += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${Errores[i]}</td>
                </tr>
            `;
            }

            tabla += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;

            contenedor.innerHTML = tabla;
        }

    </script>

    <script th:inline="javascript">

        var miAtributo = [[${ Success }]];
        if (miAtributo != null) {
            Swal.fire({
                title: "Exito!",
                text: miAtributo,
                icon: "success",
                draggable: true
            });
            document.getElementById("mostrarFormulario").style.display = "none";
            document.getElementById("FormProcesar").style.display = "flex";
        }

    </script>
</body>

</html>
