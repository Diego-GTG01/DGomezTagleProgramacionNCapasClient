<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Gestión de Usuarios</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-light">

    <div class="container-fluid px-3 py-3">
        <div class="row mb-4">

            <div class="col-12 mb-3">
                <h1 class="fw-bold">
                    <i class="bi bi-people-fill me-2 text-primary"></i>
                    Gestión de Usuarios
                </h1>
            </div>

            <div class="col-12">
                <div class="row align-items-end">

                    <div class="col-md-12">
                        <form method="post" th:object="${Usuario}" th:action="@{/Usuario}">

                            <div class="row align-items">

                                <div class="col-md-2 mb-3">
                                    <label class="form-label">Nombre(s)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-person"></i>
                                        </span>
                                        <input id="Nombre" th:field="*{Nombre}" type="text" class="form-control"
                                            placeholder="Nombre(s)">
                                    </div>
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label class="form-label">Apellido Paterno</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-person-badge"></i>
                                        </span>
                                        <input id="ApellidoPaterno" th:field="*{ApellidoPaterno}" type="text"
                                            class="form-control" placeholder="Apellido Paterno">
                                    </div>
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label class="form-label">Apellido Materno</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-person-bounding-box"></i>
                                        </span>
                                        <input id="ApellidoMaterno" th:field="*{ApellidoMaterno}" type="text"
                                            class="form-control" placeholder="Apellido Materno">
                                    </div>
                                </div>

                                <div class="col-md-2 mb-3">
                                    <label class="form-label">Rol</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-shield-lock"></i>
                                        </span>
                                        <select id="Rol" class="form-select" th:field="*{Rol.IdRol}">
                                            <option value="0" selected>Seleccione un rol</option>
                                            <option th:each="rol : ${Roles}" th:value="${rol.IdRol}"
                                                th:text="${rol.Nombre}">
                                            </option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-2 mb-3">
                                    <label class="form-label d-block">Sexo *</label>
                                    
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{Sexo}" value="">
                                        <label class="form-check-label">No especificar</label>
                                    </div>
                                    
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{Sexo}" value="MM">
                                        <label class="form-check-label">Masculino</label>
                                    </div>

                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{Sexo}" value="FF">
                                        <label class="form-check-label">Femenino</label>
                                    </div>


                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('Sexo')}"
                                        th:errors="*{Sexo}">
                                    </div>
                                </div>
                                <div class="col-md-2 mb-3">
                                    <br>


                                    <button class="btn btn-primary">
                                        <i class="bi bi-search me-2"></i>
                                        Buscar
                                    </button>

                                </div>



                            </div>
                        </form>
                    </div>
                    <div class="col-md-12 text-md-end mt-3 mt-md-0">
                        <a th:href="@{/Usuario/cargamasiva}" class="btn btn-info">
                            <i class="bi bi-person-plus me-2"></i>
                            Carga Masiva
                        </a>
                    </div>

                    <div class="col-md-12 text-md-end mt-3 mt-md-0">
                        <a th:href="@{/Usuario/Form}" class="btn btn-success">
                            <i class="bi bi-person-plus me-2"></i>
                            Agregar Usuario
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">
                    <tr class="text-center">
                        <th>#</th>
                        <th><i class="bi bi-person-circle"></i> Usuario</th>
                        <th><i class="bi bi-person-badge"></i> Nombre</th>
                        <th><i class="bi bi-telephone"></i> Contacto</th>
                        <th><i class="bi bi-geo-alt"></i> Direcciones</th>
                        <th><i class="bi bi-shield-lock"></i> Rol</th>
                        <th><i class="bi bi-check-circle"></i> Status</th>
                        <th><i class="bi bi-gear"></i> Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="usuario, iterStat : ${usuarios}" class="text-truncate" style="max-width: 150px;">
                        <td class="text-center fw-bold" th:text="${iterStat.count}"></td>

                        <td class="text-center">

                                alt="Foto de perfil">
                            <div class="fw-bold" th:text="${usuario.UserName ?: 'Sin usuario'}"></div>

                        </td>

                        <!-- Nombre -->
                        <td class="text-truncate" style="max-width: 150px;">
                            <div class="fw-bold"
                                th:text="|${usuario.Nombre ?: ''} ${usuario.ApellidoPaterno ?: ''} ${usuario.ApellidoMaterno ?: ''}|">
                            </div>
                            <small class="text-muted d-block">
                                <i class="bi bi-gender-ambiguous me-1"></i>
                                <span th:text="${usuario.Sexo == 'FF' ? 'Femenino' :
                                              usuario.Sexo == 'MM' ? 'Masculino' : 'No especificado'}"></span>
                            </small>
                            <small class="text-muted">
                                <i class="bi bi-calendar-event me-1"></i>
                                <span th:text="${usuario.FechaNacimiento ?: 'Sin fecha'}"></span>
                            </small>
                        </td>

                        <!-- Contacto -->
                        <td class="text-truncate" style="max-width: 150px;">
                            <small class="d-block text-truncate">
                                <i class="bi bi-envelope me-1"></i>
                                <span th:text="${usuario.Email ?: 'Sin email'}"></span>
                            </small>
                            <small class="d-block text-truncate">
                                <i class="bi bi-phone me-1"></i>
                                <span th:text="${usuario.Celular ?: 'Sin celular'}"></span>
                            </small>
                            <small class="d-block text-truncate">
                                <i class="bi bi-telephone me-1"></i>
                                <span th:text="${usuario.Telefono ?: 'Sin teléfono'}"></span>
                            </small>
                        </td>

                        <!-- Direcciones -->
                        <td class="text-truncate" style="max-width: 150px;">
                            <div th:if="${!#lists.isEmpty(usuario.Direcciones)}">
                                <div th:each="dir, i : ${usuario.Direcciones}" class="mb-2 small">
                                    <i class="bi bi-house-door me-1"></i>
                                    <strong th:text="|${i.count}.|"></strong>
                                    <span th:text="${dir.Calle}"></span><br>
                                    <span
                                        th:text="|No.Ext ${dir.NumeroExterior} / No.Int ${dir.NumeroInterior ?: 'N/A'}|"></span><br>
                                    <span th:text="${dir.Colonia?.Nombre}"></span><br>
                                    <span
                                        th:text="|CP ${dir.Colonia?.CodigoPostal} ${dir.Colonia.Municipio?.Nombre}|"></span><br>
                                    <span
                                        th:text="|${dir.Colonia.Municipio.Estado?.Nombre},  ${dir.Colonia.Municipio.Estado.Pais?.Nombre}|"></span><br>

                                </div>
                            </div>
                            <div th:if="${#lists.isEmpty(usuario.Direcciones)}" class="text-muted small">
                                <i class="bi bi-exclamation-circle"></i> Sin direcciones
                            </div>
                        </td>

                        <!-- Rol -->
                        <td class="text-center" style="max-width: 150px;">
                            <span class="badge" th:classappend="${usuario.rol?.Nombre == 'Administrador' ? 'bg-danger' :
                                          usuario.rol?.Nombre == 'Usuario' ? 'bg-success' :
                                          usuario.rol?.Nombre == 'Visualizador' ? 'bg-primary' : 'bg-secondary'}"
                                th:text="${usuario.rol?.Nombre ?: 'Sin rol'}">
                            </span>

                            <div class="small text-muted mt-1">
                                <i class="bi bi-clock-history me-1"></i>
                                <span th:text="${usuario.UltimoAcceso ?: 'Sin acceso'}"></span>
                            </div>
                        </td>

                        <!-- Status -->
                        <td class="text-center" style="max-width: 150px;">
                            <div class="form-check form-switch d-flex justify-content-center align-items-center">
                                <input class="form-check-input" type="checkbox" role="switch"
                                    th:id="${usuario.IdUsuario}" th:checked="${usuario.activo == 1}"
                                    th:data-usuario="${usuario.IdUsuario}" onchange="UpdateStatus(this)">
                                <label class="form-check-label ms-2 small fw-bold"
                                    th:for="'estado-' + ${usuario.IdUsuario}"
                                    th:text="${usuario.activo == 1} ? 'Activo' : 'Inactivo'"
                                    th:classappend="${usuario.activo == 1} ? 'text-success' : 'text-danger'">
                                </label>


                            </div>
                        </td>

                        <!-- Acciones -->
                        <td class="text-center" style="max-width: 150px;">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{|Usuario/${usuario.IdUsuario}|}" class="btn btn-info text-white"
                                    title="Ver">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{|Usuario/${usuario.IdUsuario}|}" class="btn btn-warning text-white"
                                    title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:id="@{|${usuario.IdUsuario}|}" onclick="abrirModal(this)" class="btn btn-danger"
                                    title="Eliminar">
                                    <i class="bi bi-trash"></i>

    function confirmarEliminacion() {

</script>
<script th:inline="javascript">
    function UpdateStatus(input) {
        console.log(input.id);
        console.log(input.checked);
        var status = 0;
        if (input.checked) {
            status = 1;
        }
        const isChecked = input.checked;
        const usuarioId = input.id;

        const label = document.querySelector(`label[for='estado-${usuarioId}']`);



        $.ajax({
            url: "http://localhost:8081/api/usuario/status/" + input.id ,
            type: "PATCH",
            dataType: "json",
            success: function (data) {
                if (data.Correct) {
                    if (isChecked) {
                        label.textContent = 'Activo';
                        label.classList.replace('text-danger', 'text-success');
                    } else {
                        label.textContent = 'Inactivo';
                        label.classList.replace('text-success', 'text-danger');
                    }

                    console.log("Estatus cambiado");
                } else {
                    console.log(data.MessageException)
                    console.log("Algo salió mal");
                }
            },
            error: function (jqXHR, textStatus, errorThrown) {
                console.error("Error al cambiar status:", textStatus, errorThrown);
            }
        });


    }


</script>
